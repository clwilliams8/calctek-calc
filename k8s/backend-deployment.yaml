apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: calctek-calc
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        # Nginx sidecar — receives HTTP, proxies via FastCGI to PHP-FPM
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx-k8s.conf
            - name: backend-code
              mountPath: /var/www/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # PHP-FPM — Laravel application
        - name: php-fpm
          image: BACKEND_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 9000
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: calctek-calc-secrets
                  key: APP_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: calctek-calc-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: calctek-calc-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: calctek-calc-config
                  key: APP_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: calctek-calc-config
                  key: FRONTEND_URL
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: calctek-calc-config
                  key: GOOGLE_REDIRECT_URI
            - name: DB_CONNECTION
              value: "sqlite"
            - name: DB_DATABASE
              value: "/var/www/html/database/database.sqlite"
          volumeMounts:
            - name: backend-code
              mountPath: /var/www/html
            - name: sqlite-storage
              mountPath: /var/www/html/database
          resources:
            requests:
              cpu: 1m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi

      # Init container to copy backend source, run migrations, and cache config
      initContainers:
        - name: copy-backend
          image: BACKEND_IMAGE_PLACEHOLDER
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: calctek-calc-secrets
                  key: APP_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: calctek-calc-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: calctek-calc-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: calctek-calc-config
                  key: APP_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: calctek-calc-config
                  key: FRONTEND_URL
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: calctek-calc-config
                  key: GOOGLE_REDIRECT_URI
            - name: DB_CONNECTION
              value: "sqlite"
            - name: DB_DATABASE
              value: "/var/www/html/database/database.sqlite"
          command:
            - sh
            - -c
            - |
              cp -r /var/www/html/* /shared/
              cp -r /var/www/html/database/. /db/
              cd /shared && php artisan migrate --force
              chown -R www-data:www-data /shared/storage /shared/bootstrap/cache
              chown -R www-data:www-data /db
          volumeMounts:
            - name: backend-code
              mountPath: /shared
            - name: sqlite-storage
              mountPath: /db

      volumes:
        - name: nginx-config
          configMap:
            name: calctek-calc-config
        - name: backend-code
          emptyDir: {}
        - name: sqlite-storage
          persistentVolumeClaim:
            claimName: calctek-sqlite-pvc
