apiVersion: v1
kind: ConfigMap
metadata:
  name: calctek-calc-config
  namespace: calctek-calc
data:
  APP_URL: "PLACEHOLDER_WILL_BE_SET_BY_MAKEFILE"
  FRONTEND_URL: "PLACEHOLDER_WILL_BE_SET_BY_MAKEFILE"
  VITE_API_URL: "PLACEHOLDER_WILL_BE_SET_BY_MAKEFILE"
  GOOGLE_REDIRECT_URI: "PLACEHOLDER_WILL_BE_SET_BY_MAKEFILE"
  nginx-k8s.conf: |
    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location /health {
            try_files $uri /index.php?$query_string;
        }
    }
