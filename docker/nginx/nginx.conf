worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Logging
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # HTTP -> HTTPS redirect
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Frontend — https://app.dev.calctek-calc.ai
    server {
        listen 443 ssl default_server;
        server_name app.dev.calctek-calc.ai;

        ssl_certificate     /ssl/mkcert.pem;
        ssl_certificate_key /ssl/mkcert.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Vite HMR WebSocket
        location /__vite_hmr {
            proxy_pass http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Backend API — https://api.dev.calctek-calc.ai (Laravel PHP-FPM)
    server {
        listen 443 ssl;
        server_name api.dev.calctek-calc.ai;

        ssl_certificate     /ssl/mkcert.pem;
        ssl_certificate_key /ssl/mkcert.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root /var/www/html/public;
        index index.php;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://app.dev.calctek-calc.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # Docs — https://docs.dev.calctek-calc.ai
    server {
        listen 443 ssl;
        server_name docs.dev.calctek-calc.ai;

        ssl_certificate     /ssl/mkcert.pem;
        ssl_certificate_key /ssl/mkcert.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://docs:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
