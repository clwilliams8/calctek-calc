services:
  nginx:
    image: nginx:alpine
    container_name: calctek-calc-nginx
    ports:
      - "${LOCAL_IP}:80:80"
      - "${LOCAL_IP}:443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/ssl:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - calctek-calc-network
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: calctek-calc-backend
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    environment:
      - APP_NAME=${APP_NAME:-CalcTek}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-https://api.dev.calctek-calc.ai}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.dev.calctek-calc.ai}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    networks:
      - calctek-calc-network
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: calctek-calc-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://api.dev.calctek-calc.ai}
    depends_on:
      - backend
    networks:
      - calctek-calc-network
    restart: "no"
    command: pnpm run dev --host

  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: calctek-calc-docs
    ports:
      - "${LOCAL_IP:-127.0.0.1}:${DOCS_PORT:-8001}:8000"
    volumes:
      - ./docs:/docs
    networks:
      - calctek-calc-network
    working_dir: /docs
    entrypoint: []
    command:
      - sh
      - -c
      - |
        pip install -r /docs/requirements.txt 2>/dev/null;
        mkdocs serve -a 0.0.0.0:8000
    restart: unless-stopped

networks:
  calctek-calc-network:
    driver: bridge
    external: true

volumes:
  frontend_node_modules:
